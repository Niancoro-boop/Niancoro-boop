<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¿Cuánto me conoces? — GameCoroFriends</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --negro: #080808;
            --rojo: #e8192c;
            --rojo-dark: #8b0f1a;
            --amarillo: #ffd60a;
            --blanco: #f0f0f0;
            --gris: #141414;
        }

        body {
            background: var(--negro);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 26px 26px;
            opacity: 0.5;
            z-index: 0;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }

        .blob-1 {
            width: 450px;
            height: 450px;
            background: var(--rojo);
            top: -130px;
            left: -130px;
            animation: flotar 10s ease-in-out infinite;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--amarillo);
            bottom: -80px;
            right: -80px;
            animation: flotar 12s ease-in-out infinite reverse;
        }

        @keyframes flotar {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(25px, 20px)
            }
        }

        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 10;
            background: #1a1a1a;
            border: 1.5px solid #2a2a2a;
            color: #666;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 8px 16px;
            border-radius: 3px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s, border-color 0.2s;
        }

        .back-btn:hover {
            color: var(--amarillo);
            border-color: var(--amarillo);
        }

        /* Auth badge arriba derecha */
        .user-badge {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            border: 1.5px solid #2a2a2a;
            border-radius: 3px;
            padding: 6px 12px 6px 6px;
        }

        .user-badge img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-badge-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--amarillo);
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--gris);
            border: 2px solid #242424;
            border-radius: 4px;
            padding: 56px 48px 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 8px 8px 0px var(--rojo);
            animation: entrar 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes entrar {
            from {
                opacity: 0;
                transform: translateY(28px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .tag {
            position: absolute;
            top: -14px;
            left: 32px;
            background: var(--amarillo);
            color: var(--negro);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 11px;
            letter-spacing: 3px;
            padding: 3px 14px;
            border-radius: 2px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 50px;
            line-height: 1;
            color: var(--blanco);
            margin-bottom: 6px;
        }

        h1 span {
            color: var(--amarillo);
        }

        .subtitle {
            font-size: 13px;
            color: #555;
            margin-bottom: 36px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            background: #0e0e0e;
            border: 1.5px solid #2a2a2a;
            border-radius: 3px;
            padding: 16px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            color: var(--blanco);
            outline: none;
            margin-bottom: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]::placeholder {
            color: #383838;
        }

        input[type="text"]:focus {
            border-color: var(--amarillo);
            box-shadow: 0 0 0 3px rgba(255, 214, 10, 0.08);
        }

        .error-msg {
            font-size: 12px;
            color: var(--rojo);
            margin-bottom: 20px;
            display: none;
        }

        @keyframes sacudir {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-6px)
            }

            75% {
                transform: translateX(6px)
            }
        }

        /* Hint de nombre pre-relleno */
        .nombre-hint {
            font-size: 11px;
            color: #444;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        button.main-btn {
            width: 100%;
            background: var(--rojo);
            color: var(--blanco);
            border: none;
            border-radius: 3px;
            padding: 17px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--rojo-dark);
            transition: transform 0.15s, box-shadow 0.15s;
            margin-top: 8px;
        }

        button.main-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--rojo-dark);
        }

        button.main-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--rojo-dark);
        }

        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 11px;
            color: #3a3a3a;
            letter-spacing: 1px;
        }

        #niancoro-link {
            color: var(--rojo);
            cursor: pointer;
            transition: color 0.2s;
        }

        #niancoro-link:hover {
            color: var(--amarillo);
        }

        /* Loading */
        .auth-check {
            position: fixed;
            inset: 0;
            background: var(--negro);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .auth-check-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 4px;
            color: #333;
        }
    </style>
</head>

<body>

    <!-- Loader mientras verifica auth -->
    <div class="auth-check" id="auth-check">
        <span class="auth-check-text">CARGANDO...</span>
    </div>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <a class="back-btn" href="../index.html">← VOLVER</a>

    <!-- Badge de usuario -->
    <div class="user-badge" id="user-badge" style="display:none;">
        <img id="user-avatar" src="" alt="" />
        <span class="user-badge-name" id="user-badge-name"></span>
    </div>

    <div class="card" id="main-card" style="display:none;">
        <div class="tag">¿CUÁNTO ME CONOCES?</div>

        <h1>CREA TU<br><span>FORMULARIO</span></h1>
        <p class="subtitle">Tu nombre o apodo ya viene de tu cuenta. Puedes cambiarlo si quieres.</p>

        <label for="nombre">Tu nombre / apodo</label>
        <input type="text" id="nombre" placeholder="Ej: Juancho, La Nena, Coro..." autocomplete="off" />
        <p class="error-msg" id="error">⚠ Escribe tu nombre para continuar</p>

        <button class="main-btn" onclick="continuar()">CREAR FORMULARIO</button>

        <p class="footer-note">by <span id="niancoro-link">Niancoro</span></p>
    </div>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC73idYjVXZgVKcBQpxTImzXbpGC_-rc_U",
            authDomain: "gamecorofriends.firebaseapp.com",
            projectId: "gamecorofriends",
            storageBucket: "gamecorofriends.firebasestorage.app",
            messagingSenderId: "373275888982",
            appId: "1:373275888982:web:94ddf75182aa8a461ddaf7",
            measurementId: "G-XL7L54CM75"
        };

        // Evita inicializar dos veces si ya existe
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-check').style.display = 'none';

            if (!user) {
                // No logueado → redirige al index
                window.location.href = '../index.html';
                return;
            }

            // Logueado → mostrar contenido
            document.getElementById('main-card').style.display = 'block';

            // Pre-rellenar nombre desde Google
            const displayName = user.displayName?.split(' ')[0] || user.email?.split('@')[0] || '';
            document.getElementById('nombre').value = displayName;

            // Badge usuario
            const badge = document.getElementById('user-badge');
            badge.style.display = 'flex';
            document.getElementById('user-badge-name').textContent = user.displayName?.toUpperCase() || user.email?.split('@')[0].toUpperCase();
            if (user.photoURL) document.getElementById('user-avatar').src = user.photoURL;
        });

        function continuar() {
            const nombre = document.getElementById('nombre').value.trim();
            const error = document.getElementById('error');
            if (!nombre) {
                error.style.display = 'block';
                error.style.animation = 'none';
                void error.offsetWidth;
                error.style.animation = 'sacudir 0.3s ease';
                document.getElementById('nombre').focus();
                return;
            }
            error.style.display = 'none';
            window.location.href = `formulario.html?nombre=${encodeURIComponent(nombre)}`;
        }

        document.getElementById('nombre').addEventListener('keydown', e => {
            if (e.key === 'Enter') continuar();
        });

        const overlay = document.getElementById('modalOverlay');
        document.getElementById('niancoro-link').addEventListener('click', () => {
            window.open('mailto:Niancoroestudiantil@gmail.com?subject=Contacto%20desde%20GameCoroFriends');
        });
    </script>
</body>

</html>
